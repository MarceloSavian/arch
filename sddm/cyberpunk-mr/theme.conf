[General]
# Path to the background image. Relative to this theme dir, or absolute.
# To swap in your own photo:
#   sudo cp /path/to/your.png /usr/share/sddm/themes/cyberpunk-mr/Backgrounds/wallpaper.png
# (or change the line below to an absolute path readable by the 'sddm' user)
Background=Backgrounds/wallpaper.png

# Dim overlay strength on top of the background (0.0 - 1.0). Higher = darker.
DimOpacity=0.45

# Palette (matches your waybar / wofi / kitty)
BgColor=#1a1c26
SurfaceColor=#252731
SurfaceHoverColor=#2e2a40
TextColor=#dfe1ea
MutedTextColor=#888a96
AccentColor=#f6768e
AccentColorAlt=#7aa2f7
BorderColor=#583794
ErrorColor=#f65e51

# Typography
FontFamily=Monocraft
FontSize=16

# Default user shown if SDDM has no last-user record. Leave blank to show empty.
DefaultUser=marcelo

# Avatar shown above the username in the login card
ShowAvatar=true
Avatar=Backgrounds/avatar.png
AvatarSize=140

# Show clock in the top-right (true/false)
ShowClock=true

# 24h or 12h clock
ClockFormat24h=true
