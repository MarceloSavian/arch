general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
    ignore_empty_input = true
}

background {
    monitor =
    path = /home/marcelo/sddm-themes/cyberpunk-mr/Backgrounds/wallpaper.png
    blur_passes = 2
    blur_size = 6
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.2
}

# Top-right clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(223, 225, 234, 1.0)
    font_size = 72
    font_family = Monocraft
    position = -50, 100
    halign = right
    valign = top
}

# Date — sits below the clock (72px font + ~25 gap)
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %-d')"
    color = rgba(223, 225, 234, 0.7)
    font_size = 16
    font_family = Monocraft
    position = -50, 195
    halign = right
    valign = top
}

# Centered avatar (the badass robot)
image {
    monitor =
    path = /home/marcelo/sddm-themes/cyberpunk-mr/Backgrounds/avatar.png
    size = 140
    border_size = 2
    border_color = rgba(246, 118, 142, 1.0)
    rounding = -1
    position = 0, 120
    halign = center
    valign = center
}

# Username
label {
    monitor =
    text = marcelo
    color = rgba(223, 225, 234, 1.0)
    font_size = 22
    font_family = Monocraft
    position = 0, 20
    halign = center
    valign = center
}

# Hint
label {
    monitor =
    text = Enter password to unlock
    color = rgba(136, 138, 150, 1.0)
    font_size = 12
    font_family = Monocraft
    position = 0, -10
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 320, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(56, 48, 80, 1.0)
    inner_color = rgba(37, 39, 49, 1.0)
    font_color = rgba(223, 225, 234, 1.0)
    fade_on_empty = false
    placeholder_text = <span foreground="##888a96">Password</span>
    hide_input = false
    rounding = 12
    check_color = rgba(122, 162, 247, 1.0)
    fail_color = rgba(246, 94, 81, 1.0)
    fail_text = <span foreground="##f65e51">Wrong password</span>
    capslock_color = rgba(224, 175, 104, 1.0)
    position = 0, -70
    halign = center
    valign = center
}
